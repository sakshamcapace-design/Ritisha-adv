<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights | Ritisha Mathur</title>
    <style>
        :root {
            --black: #000000; --dark-gray: #333333; --mid-gray: #888888; --light-gray: #F4F4F4; --white: #FFFFFF; --border-color: #E0E0E0;
            --font-heading: 'Georgia', 'Times New Roman', Times, serif; --font-body: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { color: var(--dark-gray); line-height: 1.7; background-color: var(--white); font-family: var(--font-body); padding-top: 80px; }
        h2, h3 { font-family: var(--font-heading); font-weight: normal; color: var(--black); }
        
        nav { background-color: var(--white); padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid var(--border-color); height: 80px; }
        .logo { color: var(--black); font-size: 1.4rem; font-family: var(--font-heading); text-decoration: none; letter-spacing: 2px; text-transform: uppercase; }
        .nav-links a { color: var(--dark-gray); text-decoration: none; margin-left: 2.5rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .nav-links a:hover, .nav-links a.active { color: var(--black); font-weight: bold; }

        section { padding: 6rem 10%; min-height: calc(100vh - 80px); }
        .section-title { text-align: center; font-size: 2.2rem; margin-bottom: 4rem; text-transform: uppercase; letter-spacing: 3px; }
        .section-title::after { content: ''; display: block; width: 40px; height: 1px; background: var(--black); margin: 20px auto 0; }
        
        .news-item { padding: 2rem 0; border-bottom: 1px solid var(--border-color); }
        .news-item:first-of-type { border-top: 1px solid var(--border-color); }
        .news-date { color: var(--mid-gray); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 0.5rem; }
        
        .news-title { font-size: 1.4rem; margin: 0.5rem 0 1rem 0; }
        .news-title a { text-decoration: none; color: var(--black); transition: color 0.3s; }
        .news-title a:hover { color: var(--mid-gray); }
        
        footer { background: var(--black); color: var(--mid-gray); text-align: center; padding: 2rem; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Chambers Of Advocate Ritisha Mathur</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="profile.html">Profile</a>
            <a href="practice.html">Practice</a>
            <a href="insights.html" class="active">Insights</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <section id="insights">
        <h2 class="section-title">Insights & Developments</h2>
        
        <div id="blog-container"></div>
        
    </section>

    <footer><p>&copy; 2026 Ritisha Mathur, Advocate. All Rights Reserved.</p></footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Fetch the data from the single document
            fetch('blogs.json')
                .then(response => response.json())
                .then(blogs => {
                    const container = document.getElementById('blog-container');
                    
                    // Loop through each blog and create the HTML structure
                    blogs.forEach(blog => {
                        const item = document.createElement('div');
                        item.className = 'news-item';
                        
                        item.innerHTML = `
                            <span class="news-date">${blog.date}</span>
                            <h3 class="news-title"><a href="${blog.link}">${blog.title}</a></h3>
                            <p>${blog.description}</p>
                        `;
                        
                        container.appendChild(item);
                    });
                })
                .catch(error => {
                    console.error('Error loading the blogs:', error);
                    document.getElementById('blog-container').innerHTML = '<p>Error loading insights. Please try again later.</p>';
                });
        });
    </script>
</body>
</html>
